name: Build artifacts

on:
  workflow_dispatch:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MicroPython firmware
        run: |
          curl -L -o micropython-NRF52840-supermini-v1.26.1.uf2 \
            "https://raw.githubusercontent.com/jkorte-dev/micropython-board-NRF52840/main/firmware/micropython-NRF52840-supermini-v1.26.1.uf2"

      - name: Package firmware
        run: |
          mkdir -p firmware_package/src
          cp flash.py firmware_package/
          cp -r src/drivers src/states src/main.py src/config.py src/ctx.py src/angles.csv firmware_package/src/
          cp micropython-NRF52840-supermini-v1.26.1.uf2 firmware_package/
          cp docs/QUICK_START.md firmware_package/README.md
          cd firmware_package && zip -r ../knife_level_firmware.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knife_level_firmware
          path: knife_level_firmware.zip
          retention-days: 90

  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: knife_level_android_apk
          path: App/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
